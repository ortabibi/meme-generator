<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Document</title>
</head>

<body onload="onInit()">

    <header>
        <h1>memegen</h1>
        <nav>
            <a href="#">gallery</a>
            <a href="#">about</a>
        </nav>
    </header>

    <section class="input-container">
        <input type="text" placeholder="Enter search keyword">
        <span>🔍</span>
    </section>

    <main>
        <div class="gallery-container"></div>
        <div class="editor-container">
            <canvas height="500px" width="500px"></canvas>
            <section>
                <input class="lines" type="text" placeholder="change youre txt" oninput="onInputChange(this.value)">
                <a href="#" onclick="onDownloadImg(this)" download="file-name">Download</a>
                <input class="color-picker" type="color" value="#000000" oninput="onSetColor(this.value)" />
                <button class="font-down" onclick="onIncreaseFont()">A+</button>
                <button class="font-down" onclick="onDecreaseFont()">A-</button>
                <button class="add-line" onclick="onAddLine()">add</button>
                <button class="switch-line" onclick="onSwitchLine()">switch</button>
            </section>
        </div>
    </main>


    <section class="about">
        <img src="imgs/whatsupp.jpeg" alt="profile">
        <div class="about-info">
            <h2>or tabibi</h2>
            <p>"Hi, I'm Or Tabibi, a frontend developer in training at Coding Academy. I love building cool web projects and turning ideas into reality."</p>
            <div class="about-links">
                <a href="#"><img src="imgs/linkedin.png" alt="linkedin"></a>
                <a href="#"><img src="imgs/facebook.png" alt="facebook"></a>
                <a href="#"><img src="imgs/github.png" alt="github"></a>
            </div>
        </div>
    </section>

    <footer>
        <p>memegen</p>
        <p>all rights reserved 2019</p>
    </footer>

    <script src="js/meme.service.js"></script>
    <script src="js/meme.controller.js"></script>
    <script src="js/gallery.controller.js"></script>
    <script src="main.js"></script>
</body>

</html>
